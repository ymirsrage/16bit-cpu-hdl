name: Run Nand2Tetris Tests\n\non:  \n  push: {}\n\njobs:\n  test:  \n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout Code\n        uses: actions/checkout@v2\n      - name: Download Nand2Tetris Tools\n        run: |\n          wget -q https://www.nand2tetris.org/software/Nand2Tetris-2.6.tar.gz\n          tar -xzf Nand2Tetris-2.6.tar.gz -C /tmp\n          export PATH=/tmp/Nand2Tetris/tools:$PATH\n      - name: Run ALU Tests\n        run: |\n          mkdir -p output\n          /tmp/Nand2Tetris/tools/HardwareSimulator.sh ALU.tst > output/ALU_test_result.log\n          cat output/ALU_test_result.log\n      - name: Run CPU Tests\n        run: |\n          mkdir -p output\n          /tmp/Nand2Tetris/tools/HardwareSimulator.sh CPU.tst > output/CPU_test_result.log\n          cat output/CPU_test_result.log\n